name: Deploy to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Build and Deploy to Azure
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      
      - name: Restore dependencies
        run: dotnet restore src/Terrarium.sln
      
      - name: Build
        run: dotnet build src/Terrarium.sln --configuration Release --no-restore
      
      - name: Test
        run: dotnet test src/Terrarium.sln --configuration Release --no-build --verbosity normal
      
      - name: Install azd
        uses: Azure/setup-azd@v1.0.0
      
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      
      - name: Deploy to Azure
        run: azd deploy --no-prompt
        env:
          AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME }}
          AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      
      - name: Get deployment outputs
        id: outputs
        run: |
          WEB_URL=$(azd env get-values | grep WEB_URL | cut -d'=' -f2)
          SERVER_URL=$(azd env get-values | grep SERVER_URL | cut -d'=' -f2)
          echo "web_url=$WEB_URL" >> $GITHUB_OUTPUT
          echo "server_url=$SERVER_URL" >> $GITHUB_OUTPUT
      
      - name: Deployment summary
        run: |
          echo "### Deployment Summary 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment**: ${{ vars.AZURE_ENV_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "**Location**: ${{ vars.AZURE_LOCATION }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Web URL**: ${{ steps.outputs.outputs.web_url }}" >> $GITHUB_STEP_SUMMARY
          echo "**Server URL**: ${{ steps.outputs.outputs.server_url }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Deployment completed successfully!" >> $GITHUB_STEP_SUMMARY
